version: 2

project_name: telego
dist: .build

before:
  hooks:
    - go mod tidy

builds:
  - id: telego
    main: ./cmd/telego
    binary: telego
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    tags:
      - poll_opt
      - gc_opt
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - config.example.toml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

dockers_v2:
  - images:
      - "scratchnet/telego"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    dockerfile: dist/Dockerfile
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"

release:
  github:
    owner: Scratch-net
    name: telego
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## TeleGO {{ .Tag }}

    High-performance Telegram MTProxy with TLS fronting.
  footer: |
    **Full Changelog**: https://github.com/Scratch-net/telego/compare/{{ .PreviousTag }}...{{ .Tag }}
